version: '3.8'

services:
  # Ollama service for embeddings and LLM
  ollama:
    image: ollama/ollama:latest
    container_name: talentmatch-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    # Pull models on first run
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 10
        ollama pull nomic-embed-text
        ollama pull llama3.2:3b
        wait
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Backend API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: talentmatch-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///data/talentmatch.db
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - OLLAMA_LLM_MODEL=llama3.2:3b
    volumes:
      - api_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (optional - can also run locally)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: talentmatch-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
  api_data:
